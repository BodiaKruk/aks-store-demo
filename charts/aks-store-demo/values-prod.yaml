useRabbitMQ: false
useMongoDB: false

rabbitmq:
  host: "prod-rabbitmq-host"
  port: 5672
  username: "prod-rabbitmq-user"
  password: "prod-rabbitmq-pass"

mongodb:
  host: "prod-mongodb-host"
  port: 27017
  username: "prod-mongodb-user"
  password: "prod-mongodb-pass"
  db: "orderdb"
